<section id="partners" class="container max-w-[855px] mt-[96px] mx-auto">
    <div class="flex flex-wrap gap-8">
        {{ $partners := site.Data.partners }}
        {{ $currentTag := "" }}
        {{ range $partners }}
            {{ if ne $currentTag .tag }}
                {{ if $currentTag }}
                    </ul>
                </div>
                {{ end }}
                <div class="flex-1 min-w-[250px] bg-white p-4 rounded-lg shadow-sm">
                    <h3 class="text-lg font-rubrikRegular text-black mb-2">{{ .tag }}</h3>
                    <ul class="list-disc pl-5 mb-0">
                    {{ $currentTag = .tag }}
            {{ end }}
            <li class="mb-2">
                <a href="{{ .link }}" class="text-black underline">{{ .name }}</a>
            </li>
        {{ end }}
        </ul>
    </div>
    </div>
</section>
